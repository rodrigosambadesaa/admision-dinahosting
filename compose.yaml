services:
  php-cli:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: php PHP/fibonacci.php "2026-06-01 00:00:00" "2026-06-30 23:59:59"

  web:
    image: nginx:1.27-alpine
    ports:
      - "${WEB_PORT:-8087}:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
