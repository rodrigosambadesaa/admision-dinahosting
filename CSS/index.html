<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; script-src 'none'; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action https://dinahosting.com; frame-ancestors 'none'; upgrade-insecure-requests">
    <meta http-equiv="Referrer-Policy" content="no-referrer">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="Permissions-Policy" content="accelerometer=(), camera=(), geolocation=(), gyroscope=(), microphone=(), payment=(), usb=()">
    <title>Login HTML5 + Bootstrap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-5">
                <section class="login-card">
                    <p class="login-kicker">Acceso clientes</p>
                    <h1 class="login-title">Inicia sesión</h1>
                    <p class="login-copy">Formulario HTML5 sin JavaScript con validación nativa y estilos apoyados en Bootstrap.</p>

                    <form action="https://dinahosting.com/login-usuarios" method="POST" class="needs-validation" accept-charset="UTF-8" autocomplete="on">
                        <div class="mb-3">
                            <label for="usuario" class="form-label">Usuario</label>
                            <input
                                type="email"
                                class="form-control form-control-lg"
                                id="usuario"
                                name="usuario"
                                placeholder="nombre@dominio.com"
                                autocomplete="username"
                                required
                            >
                        </div>

                        <div class="mb-3">
                            <label for="contrasena" class="form-label">Contraseña</label>
                            <input
                                type="password"
                                class="form-control form-control-lg"
                                id="contrasena"
                                name="contrasena"
                                minlength="8"
                                maxlength="64"
                                pattern="(?=.*[a-z])(?=.*[A-Z])[A-Za-z0-9]{8,64}"
                                inputmode="text"
                                autocomplete="current-password"
                                required
                            >
                            <div class="form-text">
                                Mínimo 8 caracteres, al menos una mayúscula, una minúscula y sin caracteres especiales.
                            </div>
                        </div>

                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" value="1" id="recordar_contrasena" name="recordar_contrasena">
                            <label class="form-check-label" for="recordar_contrasena">Recordar contraseña</label>
                        </div>

                        <button type="submit" class="btn btn-brand btn-lg w-100">Entrar</button>
                    </form>
                </section>
            </div>
        </div>
    </main>
</body>
</html>
